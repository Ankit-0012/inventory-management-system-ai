<!DOCTYPE html>
<html>
<head>

<title>Edit User</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Edit User</h2>

<form method="POST">

<div class="mb-3">

<label>Username</label>

<input type="text"
name="username"
class="form-control"
value="{{ user[1] }}"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input type="email"
name="email"
class="form-control"
value="{{ user[2] }}"
required>

</div>

<div class="mb-3">

<label>New Password</label>

<input type="password"
name="password"
class="form-control"
placeholder="Leave blank to keep current password">

<div class="form-text text-muted">
Only fill this field when you want to reset the user's password.
</div>

</div>

<div class="mb-3">

<label>Role</label>

<select name="role" class="form-control">

<option value="admin"
{% if user[4]=='admin' %} selected {% endif %}>
Admin
</option>

<option value="staff"
{% if user[4]=='staff' %} selected {% endif %}>
Staff
</option>

</select>

</div>

<button class="btn btn-primary">
Update User
</button>

</form>

<br>

<a href="/admin/users" class="btn btn-secondary">
Back
</a>

</div>

</body>
</html>
