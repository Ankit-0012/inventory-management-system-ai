<!DOCTYPE html>
<html>
<head>

<title>Manage Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Manage Users</h2>

<div class="d-flex gap-2 mb-3">
<a href="/admin/add_user" class="btn btn-success">
Add User
</a>

<a href="/admin/logs" class="btn btn-dark">
View Logs
</a>
</div>

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Username</th>
<th>Email</th>
<th>Role</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for user in users %}

<tr>

<td>{{ user[0] }}</td>
<td>{{ user[1] }}</td>
<td>{{ user[2] }}</td>
<td>{{ user[4] }}</td>

<td>

<a href="/change_role/{{ user[0] }}/admin"
class="btn btn-danger btn-sm">
Make Admin
</a>

<a href="/change_role/{{ user[0] }}/staff"
class="btn btn-primary btn-sm">
Make Staff
</a>

<a href="/delete_user/{{ user[0] }}"
class="btn btn-dark btn-sm"
onclick="return confirm('Delete this user?')">
Delete
</a>

<a href="/edit_user/{{ user[0] }}"
class="btn btn-warning btn-sm">
Edit
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/dashboard" class="btn btn-secondary">
Back to Dashboard
</a>

</div>

</body>
</html>
