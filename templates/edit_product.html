<!DOCTYPE html>
<html>
<head>

<title>Edit Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Edit Product</h2>

<form method="POST">

<div class="mb-3">
<label>Product Name</label>
<input type="text" name="name" class="form-control" value="{{ product[1] }}">
</div>

<div class="mb-3">
<label>Category</label>
<input type="text" name="category" class="form-control" value="{{ product[2] }}">
</div>

<div class="mb-3">
<label>Price</label>
<input type="number" step="0.01" name="price" class="form-control" value="{{ product[3] }}">
</div>

<div class="mb-3">
<label>Quantity</label>
<input type="number" name="quantity" class="form-control" value="{{ product[4] }}">
</div>

<button type="submit" class="btn btn-primary">Update Product</button>

</form>

<br>

<a href="/products" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
