<!DOCTYPE html>
<html>
<head>

<title>Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Product List</h2>

<a href="/add_product" class="btn btn-success mb-3">Add Product</a>

<table class="table table-bordered">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Category</th>
<th>Price</th>
<th>Quantity</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for product in products %}

<tr>
<td>{{ product[0] }}</td>
<td>{{ product[1] }}</td>
<td>{{ product[2] }}</td>
<td>{{ product[3] }}</td>
<td>{{ product[4] }}</td>

<td>

<a href="/edit_product/{{ product[0] }}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="/delete_product/{{ product[0] }}" class="btn btn-danger btn-sm"
onclick="return confirm('⚠ WARNING: Are you sure you want to delete this product? This action cannot be undone.')">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/dashboard" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
